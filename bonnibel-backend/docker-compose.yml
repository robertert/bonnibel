services:
  db:
    image: postgres:17

    container_name: bonnibel_db

    restart: unless-stopped

    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: bonnibel_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d bonnibel_db"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  postgres_data: